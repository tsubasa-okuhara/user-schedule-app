<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif;background:#f0f4f8;color:#333;min-height:100vh;-webkit-tap-highlight-color:transparent}
  .header{background:linear-gradient(135deg,#1a5276,#2980b9);color:#fff;padding:14px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
  .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .header h1{font-size:18px;font-weight:700;letter-spacing:1px}
  .user-name{font-size:13px;opacity:.9}
  .month-nav{display:flex;align-items:center;justify-content:center;gap:16px}
  .month-nav button{background:rgba(255,255,255,.2);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .month-nav button:active{background:rgba(255,255,255,.4)}
  .current-month{font-size:17px;font-weight:600;min-width:130px;text-align:center}

  /* 記録票ヘッダー */
  .form-header{background:#fff;margin:8px 8px 0;border-radius:10px 10px 0 0;padding:12px;border:2px solid #333;border-bottom:1px solid #999}
  .form-title{text-align:center;font-size:14px;font-weight:700;margin-bottom:8px}
  .form-info{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:11px}
  .form-info-row{display:flex;gap:4px}
  .form-info-label{color:#666;white-space:nowrap}
  .form-info-value{font-weight:600}

  /* 記録票テーブル */
  .record-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 8px;background:#fff;border-left:2px solid #333;border-right:2px solid #333}
  .record-table{width:100%;min-width:700px;border-collapse:collapse;font-size:11px}
  .record-table th{background:#e8e8e8;border:1px solid #999;padding:4px 3px;text-align:center;font-weight:700;position:sticky;top:0;z-index:2;white-space:nowrap}
  .record-table th.sub{font-size:10px;background:#f0f0f0}
  .record-table td{border:1px solid #ccc;padding:4px 3px;text-align:center;vertical-align:middle}
  .record-table tr:nth-child(even) td{background:#fafcff}
  .record-table tr.has-data td{background:#fff}
  .record-table tr.has-data:nth-child(even) td{background:#f8fbff}
  .record-table .col-day{width:28px;font-weight:600}
  .record-table .col-dow{width:22px}
  .record-table .col-svc{width:60px;font-size:10px;text-align:left;padding-left:4px}
  .record-table .col-time{width:42px;font-size:10px}
  .record-table .col-hours{width:32px;font-size:10px}
  .record-table .col-check{width:30px;cursor:pointer}
  .record-table .col-note{min-width:60px;font-size:10px;text-align:left;padding-left:4px}
  .record-table .sun{color:#e74c3c}
  .record-table .sat{color:#2980b9}

  /* チェックマーク */
  .check-cell{cursor:pointer;user-select:none;-webkit-user-select:none}
  .check-cell .checkmark{font-size:16px;color:#2e7d32;font-weight:700}
  .check-cell .checkmark.unchecked{color:#ccc;font-size:14px}

  /* 集計欄 */
  .form-footer{background:#fff;margin:0 8px 8px;border-radius:0 0 10px 10px;padding:10px 12px;border:2px solid #333;border-top:2px solid #333}
  .summary-title{font-size:12px;font-weight:700;margin-bottom:6px}
  .summary-table{width:100%;border-collapse:collapse;font-size:11px}
  .summary-table th,.summary-table td{border:1px solid #999;padding:4px 6px}
  .summary-table th{background:#e8e8e8;font-weight:700;text-align:left;white-space:nowrap}
  .summary-table td{text-align:center}
  .summary-table .total-row{background:#f0f5ff;font-weight:700}

  /* ボタン */
  .action-bar{padding:12px 12px 0;display:flex;gap:8px}
  .action-btn{flex:1;padding:12px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer}
  .action-btn:active{opacity:.8}
  .action-btn.primary{background:#1a5276;color:#fff}
  .action-btn.secondary{background:#fff;color:#1a5276;border:2px solid #1a5276}
  .action-btn:disabled{background:#ccc;color:#999;border-color:#ccc}

  .toast{position:fixed;top:-60px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:25px;font-size:14px;font-weight:600;z-index:300;transition:top .3s ease;white-space:nowrap}
  .toast.show{top:20px}
  .spacer{height:80px}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;box-shadow:0 -2px 10px rgba(0,0,0,.08);z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;color:#999;font-size:10px;cursor:pointer;border:none;background:none;text-decoration:none}
  .nav-item.active{color:#2c7a5c}
  .nav-item svg{width:22px;height:22px;margin-bottom:2px}
  .nav-item span{font-weight:600}
  .scroll-hint{text-align:center;font-size:11px;color:#999;padding:4px 0}
  @media(min-width:480px){body{max-width:480px;margin:0 auto;background:#e0e5eb}.bottom-nav{max-width:480px;left:50%;transform:translateX(-50%)}}
</style>
</head>
<body>
<div class="header">
  <div class="header-top"><h1>居宅介護サービス提供実績記録票</h1><span class="user-name" id="headerUser">--</span></div>

<!-- 集計欄 -->

    <tr class="total-row"><th>合計</th><td id="sumTotalPlan">0.0</td><td id="sumTotalActual">0.0</td></tr>
  </table>
</div>

<!-- アクションボタン -->
<div class="action-bar">
  <button class="action-btn secondary" onclick="confirmAllPending()">✓ 未確認を全て確認</button>
  <button class="action-btn primary" id="exportSheetBtn" onclick="exportToSheet()">📊 スプレッドシートに出力</button>
  <button class="action-btn secondary" onclick="exportPDF()">📄 PDF</button>
</div>

<div class="spacer"></div>
<div class="toast" id="toast"></div>

  <a class="nav-item" href="schedule.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span>スケジュール</span></a>

<script>
// ==========================================
// Supabase接続
// ==========================================
const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyBK8KVH1p5nieVm2xrK0qGnztvvv8FrQBd8d_6Pkc4mNCDAizgxBFk80SkjOj1u6EQ/exec';
const SUPABASE_URL = 'https://pbqqqwwgswniuomjlhsh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBicXFxd3dnc3duaXVvbWpsaHNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MTA3NTcsImV4cCI6MjA4OTI4Njc1N30.XgImGhrTc-cVHO9tvapCCz0y3XJZn3ma4vnd_QBYfDk';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ==========================================
// ユーティリティ
// ==========================================
function pad(n){return n<10?'0'+n:''+n}
function ds(y,m,d){return`${y}-${pad(m)}-${pad(d)}`}
function fmtTime(t){if(!t)return'';return t.substring(0,5)}

// サービス内容の分類
function svcType(task) {
  if (!task) return { name:'', category:'body', label:'身体' };
  const s = task.toString().trim();
  if (s.includes('居宅') || s.includes('身体')) return { name:'身体介護', category:'body', label:'身体' };
  if (s.includes('家事')) return { name:'家事援助', category:'house', label:'家事' };
  if (s.includes('通院')) return { name:'通院介護', category:'hospital', label:'通院' };
  if (s.includes('移動')) return { name:'移動支援', category:'mobility', label:'移動' };
  return { name: s, category:'body', label:'身体' };
}

// 時間計算（HH:MM → 小数時間）
function calcHours(start, end) {
  if (!start || !end) return 0;
  const [sh, sm] = start.split(':').map(Number);
  const [eh, em] = end.split(':').map(Number);
  const mins = (eh * 60 + em) - (sh * 60 + sm);
  return Math.max(0, mins / 60);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ==========================================
// 状態管理
// ==========================================
const clientName = sessionStorage.getItem('loggedInClient') || '';
const displayName = sessionStorage.getItem('loggedInName') || '';
const beneficiaryNumber = sessionStorage.getItem('beneficiaryNumber') || '';
let cYear, cMon;
let recordItems = []; // [ { id, date, day, dow, task, svc, planStart, planEnd, planHours, actualStart, actualEnd, actualHours, confirmed, note } ]

// ==========================================
// 初期化
// ==========================================
async function init() {
  console.log('=== records.html init開始 ===');
  if (!clientName) {
    window.location.href = 'index.html';
    return;
  }
  document.getElementById('headerUser').textContent = displayName + ' さん';
  document.getElementById('infoName').textContent = displayName;
  document.getElementById('infoJukyusha').textContent = beneficiaryNumber || '---';

  const now = new Date();
  cYear = now.getFullYear();
  cMon = now.getMonth() + 1;
  document.getElementById('currentMonth').textContent = `${cYear}年${cMon}月`;

  await loadRecords();
  renderTable();
  renderSummary();
  console.log('=== records.html init完了 ===');
}

// ==========================================
// データ取得
// ==========================================
async function loadRecords() {
  const startDate = ds(cYear, cMon, 1);
  const endDate = ds(cYear, cMon, new Date(cYear, cMon, 0).getDate());

  try {
    // schedule_web_v（ヘルパー名付き）を試行
    let rows = [];
    const { data, error } = await sb.from('schedule_web_v').select('*')
      .eq('client', clientName).gte('date', startDate).lte('date', endDate)
      .order('date').order('start_time');

    if (error) {
      const fb = await sb.from('schedule').select('*')
        .eq('client', clientName).gte('date', startDate).lte('date', endDate)
        .order('date').order('start_time');
      if (fb.error) throw fb.error;
      rows = fb.data || [];
    } else {
      rows = data || [];
    }

    // 居宅介護のみフィルタ（移動支援は別フォーム）
    recordItems = rows
      .filter(r => {
        const sv = svcType(r.task || r.summary);
        return sv.category !== 'mobility';
      })
      .map(r => {
        const dt = new Date(r.date + 'T00:00:00');
        const dowNames = ['日','月','火','水','木','金','土'];
        const sv = svcType(r.task || r.summary);
        const start = fmtTime(r.start_time);
        const end = fmtTime(r.end_time);
        const hours = calcHours(start, end);
        return {
          id: r.id,
          date: r.date,
          day: dt.getDate(),
          dow: dowNames[dt.getDay()],
          dowIdx: dt.getDay(),
          task: r.task || r.summary || '',
          svc: sv,
          planStart: start,
          planEnd: end,
          planHours: hours,
          actualStart: start, // 初期値は計画と同じ
          actualEnd: end,
          actualHours: hours,
          confirmed: r.confirmed || false,
          note: r.destination || ''
        };
      });

    console.log('実績データ:', recordItems.length, '件（居宅介護）');
  } catch (ex) {
    console.error('データ取得エラー:', ex);
    toast('データの取得に失敗しました');
  }
}

// ==========================================
// テーブル描画
// ==========================================
function renderTable() {
  const tbody = document.getElementById('recordBody');
  const dim = new Date(cYear, cMon, 0).getDate();
  const dowNames = ['日','月','火','水','木','金','土'];

  let html = '';
  for (let d = 1; d <= dim; d++) {
    const dateStr = ds(cYear, cMon, d);
    const dt = new Date(dateStr + 'T00:00:00');
    const dowIdx = dt.getDay();
    const dow = dowNames[dowIdx];
    const dowClass = dowIdx === 0 ? 'sun' : dowIdx === 6 ? 'sat' : '';

    // この日の実績データ
    const dayItems = recordItems.filter(r => r.date === dateStr);

    if (dayItems.length === 0) {
      // データなし行
      html += `<tr>
        <td class="col-day ${dowClass}">${d}</td>
        <td class="col-dow ${dowClass}">${dow}</td>
        <td class="col-svc"></td>
        <td class="col-time"></td><td class="col-time"></td><td class="col-hours"></td>
        <td class="col-time"></td><td class="col-time"></td>
        <td class="col-hours"></td>
        <td class="col-check"></td>
        <td class="col-note"></td>
      </tr>`;
    } else {
      dayItems.forEach((item, idx) => {
        const checkIcon = item.confirmed
          ? '<span class="checkmark">✓</span>'
          : '<span class="checkmark unchecked">□</span>';
        html += `<tr class="has-data">
          ${idx === 0 ? `<td class="col-day ${dowClass}" rowspan="${dayItems.length}">${d}</td><td class="col-dow ${dowClass}" rowspan="${dayItems.length}">${dow}</td>` : ''}
          <td class="col-svc">${item.svc.label}</td>
          <td class="col-time">${item.planStart}</td>
          <td class="col-time">${item.planEnd}</td>
          <td class="col-hours">${item.planHours.toFixed(1)}</td>
          <td class="col-time">${item.actualStart}</td>
          <td class="col-time">${item.actualEnd}</td>
          <td class="col-hours">${item.actualHours.toFixed(1)}</td>
          <td class="col-check check-cell" onclick="toggleConfirm('${item.id}')">${checkIcon}</td>
          <td class="col-note">${item.note}</td>
        </tr>`;
      });
    }
  }
  tbody.innerHTML = html;
}

// ==========================================
// レ点トグル
// ==========================================
async function toggleConfirm(id) {
  const item = recordItems.find(r => r.id == id);
  if (!item) return;

  const newState = !item.confirmed;
  item.confirmed = newState;

  // Supabase更新（confirmedカラムがあれば）
  try {
    await sb.from('schedule').update({
      confirmed: newState,
      confirmed_at: newState ? new Date().toISOString() : null
    }).eq('id', id);
  } catch (ex) {
    console.warn('確認更新エラー:', ex);
  }

  renderTable();
  renderSummary();
  toast(newState ? '✓ 確認しました' : '確認を取り消しました');
}

// ==========================================
// 未確認を全て確認
// ==========================================
async function confirmAllPending() {
  const pending = recordItems.filter(r => !r.confirmed);
  if (!pending.length) { toast('全て確認済みです'); return; }

  for (const item of pending) {
    item.confirmed = true;
    try {
      await sb.from('schedule').update({
        confirmed: true, confirmed_at: new Date().toISOString()
      }).eq('id', item.id);
    } catch (ex) { console.warn('一括確認エラー:', ex); }
  }

  renderTable();
  renderSummary();
  toast(`${pending.length}件を確認しました`);
}

// ==========================================
// 集計
// ==========================================
function renderSummary() {
  const cats = { body: { plan: 0, actual: 0 }, house: { plan: 0, actual: 0 }, hospBody: { plan: 0, actual: 0 }, hospNo: { plan: 0, actual: 0 } };

  recordItems.forEach(item => {
    const c = item.svc.category;
    if (c === 'body' || c === 'home') {
      cats.body.plan += item.planHours;
      cats.body.actual += item.actualHours;
    } else if (c === 'house' || c === 'housework') {
      cats.house.plan += item.planHours;
      cats.house.actual += item.actualHours;
    } else if (c === 'hospital') {
      // TODO: 身体介護を伴う/伴わないの区別
      cats.hospBody.plan += item.planHours;
      cats.hospBody.actual += item.actualHours;
    }
  });

  document.getElementById('sumBodyPlan').textContent = cats.body.plan.toFixed(1);
  document.getElementById('sumBodyActual').textContent = cats.body.actual.toFixed(1);
  document.getElementById('sumHousePlan').textContent = cats.house.plan.toFixed(1);
  document.getElementById('sumHouseActual').textContent = cats.house.actual.toFixed(1);
  document.getElementById('sumHospBodyPlan').textContent = cats.hospBody.plan.toFixed(1);
  document.getElementById('sumHospBodyActual').textContent = cats.hospBody.actual.toFixed(1);
  document.getElementById('sumHospNoPlan').textContent = cats.hospNo.plan.toFixed(1);
  document.getElementById('sumHospNoActual').textContent = cats.hospNo.actual.toFixed(1);

  const totalPlan = cats.body.plan + cats.house.plan + cats.hospBody.plan + cats.hospNo.plan;
  const totalActual = cats.body.actual + cats.house.actual + cats.hospBody.actual + cats.hospNo.actual;
  document.getElementById('sumTotalPlan').textContent = totalPlan.toFixed(1);
  document.getElementById('sumTotalActual').textContent = totalActual.toFixed(1);
}

// ==========================================
// 月切替
// ==========================================
async function changeMonth(dir) {
  cMon += dir;
  if (cMon < 1) { cMon = 12; cYear--; }
  if (cMon > 12) { cMon = 1; cYear++; }
  document.getElementById('currentMonth').textContent = `${cYear}年${cMon}月`;
  await loadRecords();
  renderTable();
  renderSummary();
}

// ==========================================
// PDF出力
// ==========================================
function exportPDF() {
  const dim = new Date(cYear, cMon, 0).getDate();
  const dowNames = ['日','月','火','水','木','金','土'];

  let html = `<div style="width:1100px;font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif;padding:20px;background:#fff">`;
  html += `<div style="text-align:center;font-size:16px;font-weight:700;margin-bottom:4px">居宅介護サービス提供実績記録票</div>`;
  html += `<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px">`;
  html += `<div>令和${cYear - 2018}年　${cMon}月</div>`;

// スプレッドシート出力（GAS経由でテンプレートにデータ流し込み）
// ==========================================
async function exportToSheet() {
  const btn = document.getElementById('exportSheetBtn');
  btn.disabled = true;
  btn.textContent = '📊 生成中…';

  try {
    const reiwa = cYear - 2018;
    const dowNames = ['日','月','火','水','木','金','土'];

    // 実績データをGASに送るペイロード作成
    const items = recordItems.map(r => ({
      date: r.date,
      dow: r.dow,
      planStart: r.planStart,
      planEnd: r.planEnd,
      confirmed: r.confirmed
    }));

    const payload = {
      action: 'export_records',
      client: clientName,
      displayName: displayName,
      beneficiaryNumber: beneficiaryNumber,
      year: cYear,
      month: cMon,
      reiwa: reiwa,
      items: items
    };

    console.log('実績記録票出力:', JSON.stringify(payload));

    // GASにPOST（CORSの都合でno-corsでは結果が読めないため、GETも試行）
    // まずPOSTで送信
    await fetch(GAS_WEB_APP_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(payload)
    });

    // no-corsではレスポンスが読めないので、完了メッセージを表示
    toast('スプレッドシートを生成しました。Googleドライブを確認してください');

  } catch (ex) {
    console.error('スプレッドシート出力エラー:', ex);
    toast('出力に失敗しました');
  } finally {
    btn.disabled = false;
    btn.textContent = '📊 スプレッドシートに出力';
  }
}

function exportExcel() {
  const dim = new Date(cYear, cMon, 0).getDate();
  const dowNames = ['日','月','火','水','木','金','土'];
  const reiwa = cYear - 2018;

  // シートデータを配列で構築
  const rows = [];

  // ヘッダー部分
  rows.push([`令和${reiwa}年`, '', `${cMon}月`, '', '', '居宅介護サービス提供実績記録票']);
  rows.push(['受給者証番号', beneficiaryNumber || '', '', '', '支給決定障害者等氏名', displayName, '', '事業所番号', '1311102592']);
  rows.push(['', '', '', '', '(障害児氏名)', '', '', '事業者及びその事業所', '合同会社つばさ']);
  rows.push(['契約支給量', '', '', '', '', '', '', '所', '奥原　友美']);
  rows.push([]); // 空行

  // テーブルヘッダー
  rows.push(['日付','曜日','サービス内容','開始時間','終了時間','計画時間数','開始時間','終了時間','算定時間数','利用者確認欄','備考']);
  rows.push(['','','','(計画)','(計画)','','(実績)','(実績)','','','']);
  const dataStartRow = rows.length; // 0-indexed

  // 日別データ
  for (let d = 1; d <= dim; d++) {
    const dateStr = ds(cYear, cMon, d);
    const dt = new Date(dateStr + 'T00:00:00');
    const dow = dowNames[dt.getDay()];
    const dayItems = recordItems.filter(r => r.date === dateStr);

    if (dayItems.length === 0) {
      rows.push([d, dow, '', '', '', '', '', '', '', '', '']);
    } else {
      dayItems.forEach((item, idx) => {
        rows.push([
          idx === 0 ? d : '',
          idx === 0 ? dow : '',
          item.svc.label,
          item.planStart,
          item.planEnd,
          item.planHours,
          item.actualStart,
          item.actualEnd,
          item.actualHours,
          item.confirmed ? '✓' : '',
          item.note
        ]);
      });
    }
  }

  // 空行
  rows.push([]);

  // 集計部分
  const cats = { body: { plan: 0, actual: 0 }, house: { plan: 0, actual: 0 }, hospBody: { plan: 0, actual: 0 }, hospNo: { plan: 0, actual: 0 } };
  recordItems.forEach(item => {
    const c = item.svc.category;
    if (c === 'body' || c === 'home') { cats.body.plan += item.planHours; cats.body.actual += item.actualHours; }
    else if (c === 'house' || c === 'housework') { cats.house.plan += item.planHours; cats.house.actual += item.actualHours; }
    else if (c === 'hospital') { cats.hospBody.plan += item.planHours; cats.hospBody.actual += item.actualHours; }
  });
  const totalPlan = cats.body.plan + cats.house.plan + cats.hospBody.plan + cats.hospNo.plan;
  const totalActual = cats.body.actual + cats.house.actual + cats.hospBody.actual + cats.hospNo.actual;

  rows.push(['','','居宅における身体介護','','計画時間数計', cats.body.plan, '', '算定時間数計', cats.body.actual]);
  rows.push(['','','通院介護（身体介護を伴う）','','', cats.hospBody.plan, '', '', cats.hospBody.actual]);
  rows.push(['','','家事援助','','', cats.house.plan, '', '', cats.house.actual]);
  rows.push(['','','通院介護（身体介護を伴わない）','','', cats.hospNo.plan, '', '', cats.hospNo.actual]);
  rows.push(['','合計','','','', totalPlan, '', '', totalActual]);

  // SheetJSでワークブック作成
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);

  // 列幅設定
  ws['!cols'] = [
    { wch: 5 },  // 日付
    { wch: 4 },  // 曜日
    { wch: 14 }, // サービス内容
    { wch: 8 },  // 開始(計画)
    { wch: 8 },  // 終了(計画)
    { wch: 8 },  // 計画時間数
    { wch: 8 },  // 開始(実績)
    { wch: 8 },  // 終了(実績)
    { wch: 8 },  // 算定時間数
    { wch: 8 },  // 利用者確認
    { wch: 14 }, // 備考
  ];

  XLSX.utils.book_append_sheet(wb, ws, `${cMon}月実績`);

  // ダウンロード
  const fileName = `居宅介護実績記録票_${displayName}_令和${reiwa}年${cMon}月.xlsx`;
  XLSX.writeFile(wb, fileName);
  toast('Excelファイルをダウンロードしました');
}
