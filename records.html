<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>実績記録 - 利用者アプリ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif;background:#f0f4f8;color:#333;min-height:100vh;-webkit-tap-highlight-color:transparent}
  .header{background:linear-gradient(135deg,#1a5276,#2980b9);color:#fff;padding:14px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
  .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .header h1{font-size:20px;font-weight:700;letter-spacing:1px}
  .user-name{font-size:13px;opacity:.9}
  .month-nav{display:flex;align-items:center;justify-content:center;gap:16px}
  .month-nav button{background:rgba(255,255,255,.2);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .month-nav button:active{background:rgba(255,255,255,.4)}
  .current-month{font-size:17px;font-weight:600;min-width:130px;text-align:center}
  .page-tabs{display:flex;background:#fff;border-bottom:1px solid #e0e0e0}
  .page-tab{flex:1;padding:11px 6px;text-align:center;font-size:13px;font-weight:600;border:none;background:none;color:#aaa;cursor:pointer;position:relative}
  .page-tab.active{color:#1a5276}
  .page-tab.active::after{content:'';position:absolute;bottom:0;left:16%;right:16%;height:3px;background:#1a5276;border-radius:3px 3px 0 0}
  .summary-bar{display:flex;justify-content:center;gap:16px;padding:10px 16px;background:#fff;border-bottom:1px solid #eee}
  .summary-item{font-size:12px;color:#666;display:flex;align-items:center;gap:4px}
  .summary-num{font-weight:700;font-size:15px;color:#1a5276}
  .legend{display:flex;justify-content:center;gap:12px;padding:8px 16px 4px}
  .legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#888}
  .legend-dot{width:8px;height:8px;border-radius:50%}
  .calendar{background:#fff;margin:8px 12px;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden}
  .cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:#f8faf9;border-bottom:1px solid #eee}
  .cal-weekdays span{text-align:center;padding:7px 0;font-size:11px;font-weight:600;color:#888}
  .cal-weekdays span:first-child{color:#e74c3c}
  .cal-weekdays span:last-child{color:#2980b9}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
  .cal-day{padding:6px 2px;text-align:center;cursor:pointer;min-height:48px;border-bottom:1px solid #f0f0f0;position:relative}
  .cal-day:active{background:#f0f5ff}
  .cal-day.selected{background:#e3f0fc}
  .cal-day.today .day-num{background:#1a5276;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;margin:0 auto}
  .cal-day.other-month{opacity:.3}
  .day-num{font-size:13px;font-weight:600;margin-bottom:2px}
  .day-dots{display:flex;justify-content:center;gap:3px;min-height:8px}
  .day-dot{width:6px;height:6px;border-radius:50%}
  .day-check{position:absolute;top:2px;right:4px;font-size:10px}
  .section{display:none;padding:0 12px 100px}
  .section.active{display:block}
  .day-detail{padding:16px 0}
  .detail-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:16px;font-weight:700}
  .count-badge{font-size:12px;color:#1a5276;background:#e3f0fc;padding:2px 10px;border-radius:12px;font-weight:600}
  .empty-msg{text-align:center;padding:30px;color:#aaa;font-size:14px}
  .record-card{background:#fff;border-radius:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;display:flex;position:relative}
  .svc-bar{width:5px;flex-shrink:0}
  .record-body{flex:1;padding:14px;display:flex;gap:12px;align-items:flex-start}
  .record-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .record-info{flex:1}
  .record-name{font-size:15px;font-weight:700}
  .record-time{font-size:13px;color:#888;margin-top:2px}
  .record-helper{font-size:12px;color:#1a5276;margin-top:2px}
  .record-dest{font-size:12px;color:#555;margin-top:4px;padding:4px 8px;background:#f8f9fa;border-radius:6px}
  .record-note{font-size:12px;color:#999;margin-top:2px}
  .record-status{position:absolute;top:10px;right:12px}
  .status-badge{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
  .status-badge.confirmed{background:#e8f5e9;color:#2e7d32}
  .status-badge.pending{background:#fff3e0;color:#e65100}
  .status-badge.unrecorded{background:#f5f5f5;color:#999}
  .confirm-btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;background:#1a5276;color:#fff;margin-top:8px}
  .confirm-btn:active{opacity:.8}
  .confirm-btn:disabled{background:#ccc;cursor:default}
  .confirm-btn.done{background:#e8f5e9;color:#2e7d32}
  .month-summary{background:#fff;margin:8px 12px;border-radius:14px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .month-summary h3{font-size:15px;font-weight:700;margin-bottom:12px;color:#1a5276}
  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .summary-card{background:#f8f9fa;border-radius:10px;padding:12px;text-align:center}
  .summary-card .label{font-size:11px;color:#888;margin-bottom:4px}
  .summary-card .value{font-size:20px;font-weight:700;color:#1a5276}
  .summary-card .unit{font-size:12px;color:#888}
  .toast{position:fixed;top:-60px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:25px;font-size:14px;font-weight:600;z-index:300;transition:top .3s ease;white-space:nowrap}
  .toast.show{top:20px}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
  .modal-overlay.show{display:flex;animation:fadeIn .2s ease}
  .modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom,0));width:100%;max-width:480px;animation:slideUp .3s ease}
  .modal h3{font-size:17px;text-align:center;margin-bottom:16px}
  .modal-buttons{display:flex;gap:10px;margin-top:16px}
  .modal-btn{flex:1;padding:13px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none}
  .modal-btn:active{transform:scale(.97)}
  .modal-btn.cancel{background:#eee;color:#666}
  .modal-btn.confirm{background:#1a5276;color:#fff}
  .sign-area{border:2px dashed #ccc;border-radius:12px;padding:30px;text-align:center;color:#aaa;font-size:14px;margin:12px 0;min-height:100px;display:flex;align-items:center;justify-content:center}
  .sign-area.signed{border-color:#2e7d32;background:#f1f8e9;color:#2e7d32}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;box-shadow:0 -2px 10px rgba(0,0,0,.08);z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;color:#999;font-size:10px;cursor:pointer;border:none;background:none;text-decoration:none}
  .nav-item.active{color:#2c7a5c}
  .nav-item svg{width:22px;height:22px;margin-bottom:2px}
  .nav-item span{font-weight:600}
  .spacer{height:80px}
  @media(min-width:480px){body{max-width:480px;margin:0 auto;background:#e0e5eb}.bottom-nav{max-width:480px;left:50%;transform:translateX(-50%)}}
</style>
</head>
<body>
<div class="header">

  <div class="month-nav">
    <button onclick="changeMonth(-1)">◀</button>
    <span class="current-month" id="currentMonth"></span>
    <button onclick="changeMonth(1)">▶</button>
  </div>
</div>
<div class="page-tabs">
  <button class="page-tab active" onclick="switchPage(this,'calendar')">カレンダー</button>
  <button class="page-tab" onclick="switchPage(this,'list')">一覧</button>
  <button class="page-tab" onclick="switchPage(this,'summary')">月間集計</button>
</div>
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#2196f3"></div>移動</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4caf50"></div>居宅</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff9800"></div>家事</div>

  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- カレンダータブ -->
<div class="section active" id="sec-calendar">
  <div class="day-detail" id="dayDetail">
    <div class="detail-header"><span id="detailDate"></span><span class="count-badge" id="detailCount"></span></div>

  </div>
  <div class="month-summary" style="margin:16px 0">
    <h3>サービス種類別</h3>
    <div id="summaryByType"></div>

</div>

<!-- 確認モーダル -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <h3>実績確認</h3>
    <div id="confirmDetail"></div>
    <div class="sign-area" id="signArea">タップして確認サインをする</div>
    <div class="modal-buttons">
      <button class="modal-btn cancel" onclick="closeModal()">閉じる</button>
      <button class="modal-btn confirm" id="confirmBtn" onclick="doConfirm()">✓ 確認済みにする</button>

</div>

<div class="spacer"></div>
<div class="toast" id="toast"></div>

  <a class="nav-item" href="schedule.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span>スケジュール</span></a>
  <a class="nav-item" href="mypage.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M5.5 21a8.38 8.38 0 0113 0"/></svg><span>マイページ</span></a>
</nav>

<script>
// ==========================================
// Supabase接続
// ==========================================
const SUPABASE_URL = 'https://pbqqqwwgswniuomjlhsh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBicXFxd3dnc3duaXVvbWpsaHNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MTA3NTcsImV4cCI6MjA4OTI4Njc1N30.XgImGhrTc-cVHO9tvapCCz0y3XJZn3ma4vnd_QBYfDk';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ==========================================
// ユーティリティ
// ==========================================
function pad(n){return n<10?'0'+n:''+n}
function ds(y,m,d){return`${y}-${pad(m)}-${pad(d)}`}
function fmtTime(t){if(!t)return'--:--';return t.substring(0,5)}
function fmtD(d){
  if(!d)return'';
  const dt=new Date(d+'T00:00:00');
  const wd=['日','月','火','水','木','金','土'];
  return `${dt.getMonth()+1}月${dt.getDate()}日（${wd[dt.getDay()]}）`;
}
function taskInfo(t) {
  if (!t) return { name:'その他', icon:'📋', color:'#888', cls:'other' };
  const s = t.toString().trim();
  if (s.includes('移動')) return { name:'移動支援', icon:'🚶', color:'#2196f3', cls:'mobility' };
  if (s.includes('居宅')) return { name:'居宅介護', icon:'🏠', color:'#4caf50', cls:'home' };
  if (s.includes('家事')) return { name:'家事援助', icon:'🧹', color:'#ff9800', cls:'housework' };
  if (s.includes('通院')) return { name:'通院等介助', icon:'🏥', color:'#9c27b0', cls:'hospital' };
  return { name:s, icon:'📋', color:'#888', cls:'other' };
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ==========================================
// 状態管理
// ==========================================
const clientName = sessionStorage.getItem('loggedInClient') || '';
const displayName = sessionStorage.getItem('loggedInName') || '';
let cYear, cMon, selDate, curPage = 'calendar';
let recordData = {}; // { 'YYYY-MM-DD': [ { id, task, start, end, helper, destination, confirmed, confirmed_at, ... } ] }
let confirmTarget = null;

// ==========================================
// 初期化
// ==========================================
async function init() {
  console.log('=== records.html init開始 ===');
  if (!clientName) {
    window.location.href = 'index.html';
    return;
  }
  document.getElementById('headerUser').textContent = displayName + ' さん';

  const now = new Date();
  cYear = now.getFullYear();
  cMon = now.getMonth() + 1;
  selDate = now.toISOString().slice(0,10);
  document.getElementById('currentMonth').textContent = `${cYear}年${cMon}月`;

  await loadRecords();
  renderCalendar();
  renderDayDetail();
  console.log('=== records.html init完了 ===');
}

// ==========================================
// データ取得（scheduleテーブルから実績として読み込み）
// ==========================================
async function loadRecords() {
  const startDate = ds(cYear, cMon, 1);
  const endDate = ds(cYear, cMon, new Date(cYear, cMon, 0).getDate());

  try {
    // まずschedule_web_v VIEWを試行（ヘルパー名付き）
    const { data, error } = await sb.from('schedule_web_v').select('*')
      .eq('client', clientName).gte('date', startDate).lte('date', endDate)
      .order('date').order('start_time');

    recordData = {};
    if (error) {
      // フォールバック
      const fb = await sb.from('schedule').select('*')
        .eq('client', clientName).gte('date', startDate).lte('date', endDate)
        .order('date').order('start_time');
      if (fb.error) throw fb.error;
      if (fb.data) fb.data.forEach(row => {
        const d = row.date;
        if (!recordData[d]) recordData[d] = [];
        recordData[d].push({
          id: row.id, task: row.task || row.summary || '',
          start: fmtTime(row.start_time), end: fmtTime(row.end_time),
          helper: row.name || '', destination: row.destination || '',
          confirmed: row.confirmed || false,
          confirmed_at: row.confirmed_at || null,
          summary: row.summary || ''
        });
      });
    } else {
      if (data) data.forEach(row => {
        const d = row.date;
        if (!recordData[d]) recordData[d] = [];
        recordData[d].push({
          id: row.id, task: row.task || row.summary || '',
          start: fmtTime(row.start_time), end: fmtTime(row.end_time),
          helper: row.name || '', destination: row.destination || '',
          confirmed: row.confirmed || false,
          confirmed_at: row.confirmed_at || null,
          summary: row.summary || ''
        });
      });
    }
  } catch (ex) {
    console.error('データ取得エラー:', ex);
    toast('データの取得に失敗しました');
  }
}

// ==========================================
// カレンダー描画
// ==========================================
function renderCalendar() {
  const g = document.getElementById('calGrid');
  g.innerHTML = '';
  const f = new Date(cYear, cMon-1, 1);
  const sd = f.getDay();
  const dim = new Date(cYear, cMon, 0).getDate();
  const pd = new Date(cYear, cMon-1, 0).getDate();
  const td = new Date().toISOString().slice(0,10);
  const tc = Math.ceil((sd+dim)/7)*7;

  for (let i = 0; i < tc; i++) {
    let day, d2, ot = false;
    if (i < sd) { day=pd-sd+i+1; const pm=cMon-1<1?12:cMon-1,py=cMon-1<1?cYear-1:cYear; d2=ds(py,pm,day); ot=true; }
    else if (i-sd >= dim) { day=i-sd-dim+1; const nm=cMon+1>12?1:cMon+1,ny=cMon+1>12?cYear+1:cYear; d2=ds(ny,nm,day); ot=true; }
    else { day=i-sd+1; d2=ds(cYear,cMon,day); }

    const c = document.createElement('div');
    c.className = 'cal-day';
    if (ot) c.classList.add('other-month');
    if (d2===td) c.classList.add('today');
    if (d2===selDate) c.classList.add('selected');
    c.dataset.date = d2;
    c.onclick = () => selectDate(d2);

    const n = document.createElement('div');
    n.className = 'day-num';
    n.textContent = day;
    c.appendChild(n);

    // ドット表示
    const dots = document.createElement('div');
    dots.className = 'day-dots';
    if (recordData[d2]) {
      const types = [...new Set(recordData[d2].map(s => taskInfo(s.task).cls))];
      types.forEach(cls => {
        const d = document.createElement('div');
        d.className = 'day-dot';
        const colors = {home:'#4caf50',mobility:'#2196f3',housework:'#ff9800',hospital:'#9c27b0',other:'#888'};
        d.style.background = colors[cls] || '#888';
        dots.appendChild(d);
      });

      // 全件確認済みならチェックマーク
      const allConfirmed = recordData[d2].every(r => r.confirmed);
      if (allConfirmed && recordData[d2].length > 0) {
        const check = document.createElement('div');
        check.className = 'day-check';
        check.textContent = '✓';
        check.style.color = '#2e7d32';
        c.appendChild(check);
      }
    }
    c.appendChild(dots);
    g.appendChild(c);
  }
}

function selectDate(d) {
  selDate = d;
  document.querySelectorAll('.cal-day').forEach(c => c.classList.toggle('selected', c.dataset.date===d));
  renderDayDetail();
}

async function changeMonth(dir) {
  cMon += dir;
  if (cMon<1){cMon=12;cYear--} if(cMon>12){cMon=1;cYear++}
  document.getElementById('currentMonth').textContent = `${cYear}年${cMon}月`;
  selDate = ds(cYear, cMon, 1);
  await loadRecords();
  renderCalendar();
  renderDayDetail();
  renderList();
  renderSummary();
}

// ==========================================
// カレンダータブ: 日別詳細
// ==========================================
function renderDayDetail() {
  document.getElementById('detailDate').textContent = fmtD(selDate);
  const items = recordData[selDate] || [];
  document.getElementById('detailCount').textContent = items.length ? `${items.length}件` : '';
  const l = document.getElementById('detailList');
  if (!items.length) { l.innerHTML = '<div class="empty-msg">この日の実績はありません</div>'; return; }
  l.innerHTML = items.map((i, idx) => {
    const ti = taskInfo(i.task);
    const statusClass = i.confirmed ? 'confirmed' : 'pending';
    const statusText = i.confirmed ? '確認済み' : '未確認';
    return `<div class="record-card" onclick="openConfirmModal('${selDate}',${idx})">
      <div class="svc-bar" style="background:${ti.color}"></div>
      <div class="record-body">
        <div class="record-icon" style="background:${ti.color}20">${ti.icon}</div>
        <div class="record-info">
          <div class="record-name">${ti.name}</div>
          <div class="record-time">${i.start} 〜 ${i.end}</div>
          ${i.helper ? `<div class="record-helper">担当: ${i.helper}</div>` : ''}
          ${i.destination ? `<div class="record-dest">📍 ${i.destination}</div>` : ''}
          ${i.summary && i.summary !== i.task ? `<div class="record-note">${i.summary}</div>` : ''}
        </div>
      </div>
      <div class="record-status"><span class="status-badge ${statusClass}">${statusText}</span></div>
    </div>`;
  }).join('');

  // 未確認があれば一括確認ボタン
  const pending = items.filter(i => !i.confirmed);
  if (pending.length > 0) {
    l.innerHTML += `<button class="confirm-btn" onclick="confirmAllDay()">✓ この日の実績を全て確認する</button>`;
  } else if (items.length > 0) {
    l.innerHTML += `<button class="confirm-btn done" disabled>✓ この日の実績は全て確認済みです</button>`;
  }
}

// ==========================================
// 一覧タブ
// ==========================================
function renderList() {
  const l = document.getElementById('listAll');
  document.getElementById('listTitle').textContent = `${cMon}月の実績一覧`;
  const allDates = Object.keys(recordData).sort();
  if (!allDates.length) { l.innerHTML = '<div class="empty-msg">今月の実績はありません</div>'; return; }

  l.innerHTML = allDates.map(date => {
    const items = recordData[date];
    return `<div style="margin-bottom:16px">
      <div style="font-size:14px;font-weight:700;margin-bottom:6px;color:#555">${fmtD(date)}</div>
      ${items.map((i, idx) => {
        const ti = taskInfo(i.task);
        const statusClass = i.confirmed ? 'confirmed' : 'pending';
        const statusText = i.confirmed ? '確認済' : '未確認';
        return `<div class="record-card" onclick="openConfirmModal('${date}',${idx})" style="margin-bottom:6px">
          <div class="svc-bar" style="background:${ti.color}"></div>
          <div class="record-body" style="padding:10px 12px">
            <div class="record-icon" style="background:${ti.color}20;width:32px;height:32px;font-size:14px">${ti.icon}</div>
            <div class="record-info">
              <div style="font-size:13px;font-weight:600">${ti.name}　${i.start}〜${i.end}</div>
              ${i.helper ? `<div style="font-size:11px;color:#1a5276">${i.helper}</div>` : ''}
            </div>
          </div>
          <div class="record-status"><span class="status-badge ${statusClass}" style="font-size:10px">${statusText}</span></div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

// ==========================================
// 月間集計タブ
// ==========================================
function renderSummary() {
  document.getElementById('summaryTitle').textContent = `${cMon}月 月間集計`;
  const allItems = Object.values(recordData).flat();
  const total = allItems.length;
  const confirmed = allItems.filter(i => i.confirmed).length;

  // 合計時間計算
  let totalMinutes = 0;
  allItems.forEach(i => {
    if (i.start && i.end && i.start !== '--:--' && i.end !== '--:--') {
      const [sh, sm] = i.start.split(':').map(Number);
      const [eh, em] = i.end.split(':').map(Number);
      totalMinutes += (eh * 60 + em) - (sh * 60 + sm);
    }
  });
  const totalHours = Math.floor(totalMinutes / 60);
  const totalMins = totalMinutes % 60;

  document.getElementById('summaryGrid').innerHTML = `
    <div class="summary-card"><div class="label">サービス回数</div><div class="value">${total}<span class="unit">回</span></div></div>
    <div class="summary-card"><div class="label">合計時間</div><div class="value">${totalHours}<span class="unit">時間</span>${totalMins ? `${totalMins}<span class="unit">分</span>` : ''}</div></div>
    <div class="summary-card"><div class="label">確認済み</div><div class="value">${confirmed}<span class="unit">件</span></div></div>
    <div class="summary-card"><div class="label">未確認</div><div class="value">${total - confirmed}<span class="unit">件</span></div></div>
  `;

  // サービス種類別
  const byType = {};
  allItems.forEach(i => {
    const ti = taskInfo(i.task);
    if (!byType[ti.name]) byType[ti.name] = { count: 0, minutes: 0, color: ti.color, icon: ti.icon };
    byType[ti.name].count++;
    if (i.start && i.end && i.start !== '--:--' && i.end !== '--:--') {
      const [sh, sm] = i.start.split(':').map(Number);
      const [eh, em] = i.end.split(':').map(Number);
      byType[ti.name].minutes += (eh * 60 + em) - (sh * 60 + sm);
    }
  });

  document.getElementById('summaryByType').innerHTML = Object.entries(byType).map(([name, d]) => {
    const h = Math.floor(d.minutes / 60);
    const m = d.minutes % 60;
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #eee">
      <div style="width:36px;height:36px;border-radius:10px;background:${d.color}20;display:flex;align-items:center;justify-content:center;font-size:16px">${d.icon}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:600">${name}</div><div style="font-size:12px;color:#888">${d.count}回 ・ ${h}時間${m ? m + '分' : ''}</div></div>
    </div>`;
  }).join('') || '<div class="empty-msg">データがありません</div>';
}

// ==========================================
// 確認モーダル
// ==========================================
function openConfirmModal(date, idx) {
  const items = recordData[date];
  if (!items || !items[idx]) return;
  confirmTarget = { date, idx, item: items[idx] };

  const i = items[idx];
  const ti = taskInfo(i.task);
  document.getElementById('confirmDetail').innerHTML = `
    <div style="text-align:center;margin-bottom:12px">
      <div style="font-size:16px;font-weight:700">${fmtD(date)}</div>
      <div style="font-size:20px;margin:8px 0">${ti.icon} ${ti.name}</div>
      <div style="font-size:15px;color:#555">${i.start} 〜 ${i.end}</div>
      ${i.helper ? `<div style="font-size:14px;color:#1a5276;margin-top:4px">担当: ${i.helper}</div>` : ''}
      ${i.destination ? `<div style="font-size:13px;margin-top:8px;padding:8px 12px;background:#f8f9fa;border-radius:8px">📍 ${i.destination}</div>` : ''}
    </div>`;

  const signArea = document.getElementById('signArea');
  const confirmBtn = document.getElementById('confirmBtn');
  if (i.confirmed) {
    signArea.className = 'sign-area signed';
    signArea.textContent = `✓ ${i.confirmed_at ? new Date(i.confirmed_at).toLocaleString('ja-JP') + 'に確認済み' : '確認済み'}`;
    confirmBtn.disabled = true;
    confirmBtn.textContent = '確認済み';
    confirmBtn.className = 'modal-btn confirm';
    confirmBtn.style.background = '#e8f5e9';
    confirmBtn.style.color = '#2e7d32';
  } else {
    signArea.className = 'sign-area';
    signArea.textContent = 'タップして確認サインをする';
    signArea.onclick = () => {
      signArea.className = 'sign-area signed';
      signArea.textContent = `✓ ${displayName} 確認`;
      signArea.onclick = null;
    };
    confirmBtn.disabled = false;
    confirmBtn.textContent = '✓ 確認済みにする';
    confirmBtn.className = 'modal-btn confirm';
    confirmBtn.style.background = '#1a5276';
    confirmBtn.style.color = '#fff';
  }

  document.getElementById('confirmModal').classList.add('show');
}

function closeModal() {
  document.getElementById('confirmModal').classList.remove('show');
  confirmTarget = null;
}

async function doConfirm() {
  if (!confirmTarget) return;
  const { date, idx, item } = confirmTarget;

  try {
    // Supabase の schedule テーブルに confirmed フラグを更新
    // ※ confirmed カラムが無い場合はエラーになるが、今後テーブル拡張で対応
    const { error } = await sb.from('schedule')
      .update({ confirmed: true, confirmed_at: new Date().toISOString() })
      .eq('id', item.id);

    if (error) {
      console.warn('確認更新エラー（カラム未作成の可能性）:', error);
      // カラムが無くてもローカルでは確認済みにする
    }

    // ローカルデータを更新
    if (recordData[date] && recordData[date][idx]) {
      recordData[date][idx].confirmed = true;
      recordData[date][idx].confirmed_at = new Date().toISOString();
    }

    closeModal();
    renderCalendar();
    renderDayDetail();
    renderList();
    renderSummary();
    toast('実績を確認しました');
  } catch (ex) {
    console.error('確認処理エラー:', ex);
    toast('確認処理に失敗しました');
  }
}

async function confirmAllDay() {
  const items = recordData[selDate] || [];
  const pending = items.filter(i => !i.confirmed);
  if (!pending.length) return;

  for (const item of pending) {
    try {
      await sb.from('schedule')
        .update({ confirmed: true, confirmed_at: new Date().toISOString() })
        .eq('id', item.id);
    } catch (ex) {
      console.warn('一括確認エラー:', ex);
    }
    item.confirmed = true;
    item.confirmed_at = new Date().toISOString();
  }

  renderCalendar();
  renderDayDetail();
  renderList();
  renderSummary();
  toast(`${fmtD(selDate)}の実績を全て確認しました`);
}

// ==========================================
// ページ切替
// ==========================================
function switchPage(tab, page) {
  curPage = page;
  document.querySelectorAll('.page-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+page).classList.add('active');
  if (page === 'list') renderList();
  if (page === 'summary') renderSummary();
}

// 初期化
init();
</script>
