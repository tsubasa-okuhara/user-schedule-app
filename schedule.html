<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>スケジュール - 利用者アプリ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif;background:#f0f4f8;color:#333;min-height:100vh;-webkit-tap-highlight-color:transparent}
  .header{background:linear-gradient(135deg,#2c7a5c,#3a9d72);color:#fff;padding:14px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
  .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .header h1{font-size:20px;font-weight:700;letter-spacing:1px}
  .user-name{font-size:13px;opacity:.9}
  .month-nav{display:flex;align-items:center;justify-content:center;gap:16px}
  .month-nav button{background:rgba(255,255,255,.2);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .month-nav button:active{background:rgba(255,255,255,.4)}
  .current-month{font-size:17px;font-weight:600;min-width:130px;text-align:center}
  .page-tabs{display:flex;background:#fff;border-bottom:1px solid #e0e0e0}
  .page-tab{flex:1;padding:11px 6px;text-align:center;font-size:13px;font-weight:600;border:none;background:none;color:#aaa;cursor:pointer;position:relative}
  .page-tab.active{color:#2c7a5c}
  .page-tab.active::after{content:'';position:absolute;bottom:0;left:16%;right:16%;height:3px;background:#2c7a5c;border-radius:3px 3px 0 0}
  .legend{display:flex;justify-content:center;gap:12px;padding:8px 16px 4px}
  .legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#888}
  .legend-dot{width:8px;height:8px;border-radius:50%}
  .calendar{background:#fff;margin:8px 12px;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden}
  .cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:#f8faf9;border-bottom:1px solid #eee}
  .cal-weekdays span{text-align:center;padding:7px 0;font-size:11px;font-weight:600;color:#888}
  .cal-weekdays span:first-child{color:#e74c3c}
  .cal-weekdays span:last-child{color:#2980b9}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
  .cal-day{min-height:52px;padding:3px 2px;border-right:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;cursor:pointer;position:relative}
  .cal-day:nth-child(7n){border-right:none}
  .cal-day:active{background:#f0f5f2}
  .cal-day.other-month{opacity:.25;pointer-events:none}
  .cal-day.today .day-num{background:#2c7a5c;color:#fff!important;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
  .cal-day.selected{background:#e8f5e9}
  .day-num{font-size:12px;font-weight:600;text-align:center;margin-bottom:2px;display:flex;justify-content:center}
  .cal-day:nth-child(7n+1) .day-num{color:#e74c3c}
  .cal-day:nth-child(7n) .day-num{color:#2980b9}
  .day-dots{display:flex;justify-content:center;gap:2px;flex-wrap:wrap}
  .day-dot{width:5px;height:5px;border-radius:50%}
  .section{display:none}.section.active{display:block}
  .day-detail{margin:0 12px 12px}
  .detail-header{font-size:15px;font-weight:700;padding:10px 4px 8px;display:flex;justify-content:space-between;align-items:center}
  .count-badge{font-size:12px;color:#888;font-weight:500}
  .sched-card{background:#fff;border-radius:12px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden;display:flex}
  .svc-bar{width:6px;flex-shrink:0}
  .sched-body{flex:1;padding:12px 14px;display:flex;align-items:center;gap:10px}
  .sched-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .sched-info{flex:1;min-width:0}
  .sched-name{font-size:14px;font-weight:700;margin-bottom:1px}
  .sched-time{font-size:12px;color:#888}
  .sched-note{font-size:11px;color:#aaa;margin-top:1px}
  .sched-helper{font-size:11px;color:#2c7a5c;margin-top:2px}
  .sched-actions{display:flex;gap:6px;flex-shrink:0}
  .act-btn{width:34px;height:34px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px}
  .act-btn:active{transform:scale(.9)}
  .act-btn.edit{background:#e3f2fd;color:#1976d2}
  .act-btn.del{background:#fce4ec;color:#c62828}
  .empty-msg{background:#fff;border-radius:12px;padding:28px;text-align:center;color:#bbb;font-size:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .loading-msg{text-align:center;padding:30px;color:#888;font-size:14px}
  .loading-msg .spin{display:inline-block;width:20px;height:20px;border:3px solid #ccc;border-top-color:#2c7a5c;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .change-container{padding:12px}
  .change-hint{background:#e3f2fd;border-radius:10px;padding:10px 14px;font-size:13px;color:#1565c0;margin-bottom:10px;line-height:1.5}
  .add-float-btn{position:fixed;bottom:80px;right:20px;width:56px;height:56px;border-radius:50%;background:#2c7a5c;color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 12px rgba(44,122,92,.4);z-index:50;display:none;align-items:center;justify-content:center}
  .add-float-btn.show{display:flex}
  .add-float-btn:active{transform:scale(.9)}
  .request-history{margin-top:12px}.request-history h4{font-size:14px;color:#555;margin-bottom:8px}
  .req-card{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.05);display:flex;align-items:center;gap:10px}
  .req-type-badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;flex-shrink:0}
  .req-type-badge.add{background:#e8f5e9;color:#2e7d32}
  .req-type-badge.edit{background:#e3f2fd;color:#1565c0}
  .req-type-badge.cancel{background:#fce4ec;color:#c62828}
  .req-info{flex:1;font-size:13px;color:#555}
  .req-status{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;flex-shrink:0}
  .req-status.wait{background:#fff3e0;color:#e65100}
  .req-status.approved{background:#e8f5e9;color:#2e7d32}
  .submit-container{padding:12px}
  .submit-card{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden}
  .submit-header{background:#f8faf9;padding:16px 18px;border-bottom:1px solid #eee}
  .submit-header h3{font-size:16px;margin-bottom:4px}
  .submit-header p{font-size:13px;color:#888}
  .submit-info{padding:16px 18px}
  .info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
  .info-row:last-child{border-bottom:none}
  .info-label{color:#888;font-size:13px}
  .info-value{font-weight:600}
  .submit-status-box{margin:16px 18px;padding:14px;border-radius:12px;text-align:center;font-weight:700;font-size:15px}
  .submit-status-box.pending{background:#fff3e0;color:#e65100;border:2px dashed #ffcc80}
  .submit-status-box.done{background:#e8f5e9;color:#2e7d32;border:2px solid #a5d6a7}
  .submit-list{padding:0 18px 12px}
  .submit-list h4{font-size:14px;color:#555;margin-bottom:8px;padding-top:8px;border-top:1px solid #f0f0f0}
  .submit-preview{max-height:200px;overflow-y:auto}
  .sp-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;border-bottom:1px solid #f8f8f8}
  .sp-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .sp-date{color:#888;min-width:60px}
  .submit-action{padding:0 18px 20px}
  .submit-btn{width:100%;padding:15px;border-radius:12px;border:none;font-size:16px;font-weight:700;cursor:pointer;background:#2c7a5c;color:#fff}
  .submit-btn:active{opacity:.8}
  .submit-btn:disabled{background:#ccc;cursor:default}
  .submit-add-btn{width:100%;padding:14px;border:2px dashed #2c7a5c;border-radius:12px;background:none;color:#2c7a5c;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:12px}
  .submit-add-btn:active{background:#e8f5e9}
  .submit-entry{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border-radius:10px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .submit-entry-info{flex:1}
  .submit-entry-type{font-size:13px;font-weight:700}
  .submit-entry-time{font-size:12px;color:#888}
  .submit-entry-del{width:30px;height:30px;border-radius:50%;border:none;background:#fce4ec;color:#c62828;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
  .modal-overlay.show{display:flex;animation:fadeIn .2s ease}
  .modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom,0));width:100%;max-width:480px;animation:slideUp .3s ease;max-height:85vh;overflow-y:auto}
  .modal h3{font-size:17px;text-align:center;margin-bottom:16px}
  .modal-buttons{display:flex;gap:10px;margin-top:16px}
  .modal-btn{flex:1;padding:13px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none}
  .modal-btn:active{transform:scale(.97)}
  .modal-btn.cancel{background:#eee;color:#666}
  .modal-btn.confirm{background:#2c7a5c;color:#fff}
  .modal-btn.danger{background:#c62828;color:#fff}
  .form-group{margin-bottom:12px}
  .form-group label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:5px}
  .form-group select,.form-group input,.form-group textarea{width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;font-family:inherit;-webkit-appearance:none;background:#fff}
  .form-group select:focus,.form-group input:focus,.form-group textarea:focus{outline:none;border-color:#2c7a5c}
  .form-group textarea{resize:vertical;min-height:56px}
  .toast{position:fixed;top:-60px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:25px;font-size:14px;font-weight:600;z-index:300;transition:top .3s ease;white-space:nowrap}
  .toast.show{top:20px}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;box-shadow:0 -2px 10px rgba(0,0,0,.08);z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;color:#999;font-size:10px;cursor:pointer;border:none;background:none;text-decoration:none}
  .nav-item.active{color:#2c7a5c}
  .nav-item svg{width:22px;height:22px;margin-bottom:2px}
  .nav-item span{font-weight:600}
  .spacer{height:80px}
  @media(min-width:480px){body{max-width:480px;margin:0 auto;background:#e0e5eb}.bottom-nav{max-width:480px;left:50%;transform:translateX(-50%)}.add-float-btn{right:calc(50% - 220px)}}
</style>
</head>
<body>
<div class="header">
  <div class="header-top"><h1>スケジュール</h1><span class="user-name" id="headerUser">--</span></div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">◀</button>
    <span class="current-month" id="currentMonth"></span>
    <button onclick="changeMonth(1)">▶</button>
  </div>
</div>
<div class="page-tabs">
  <button class="page-tab active" onclick="switchPage(this,'confirm')">確認</button>
  <button class="page-tab" onclick="switchPage(this,'submit')">提出</button>
  <button class="page-tab" onclick="switchPage(this,'change')">変更・追加</button>
</div>
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#4caf50"></div>居宅</div>
  <div class="legend-item"><div class="legend-dot" style="background:#2196f3"></div>移動</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff9800"></div>家事</div>
  <div class="legend-item"><div class="legend-dot" style="background:#9c27b0"></div>通院</div>
</div>
<div class="calendar">
  <div class="cal-weekdays"><span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span></div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- 確認タブ -->
<div class="section active" id="sec-confirm">
  <div class="day-detail" id="dayDetail">
    <div class="detail-header"><span id="detailDate"></span><span class="count-badge" id="detailCount"></span></div>
    <div id="detailList"></div>
  </div>
</div>

<!-- 提出タブ -->
<div class="section" id="sec-submit">
  <div class="submit-container">
    <div class="submit-card">
      <div class="submit-header"><h3>来月のスケジュール希望提出</h3><p id="submitTarget"></p></div>
      <button class="submit-add-btn" onclick="openSubmitAddModal()">＋ 希望日時を追加</button>
      <div class="submit-list" style="padding:0 18px 12px"><h4 style="font-size:14px;color:#555;margin-bottom:8px;padding-top:8px;border-top:1px solid #f0f0f0">追加済みの希望一覧</h4><div class="submit-preview" id="submitPreview"></div></div>
      <div class="submit-info" style="padding:8px 18px 12px"><div class="info-row" style="border-bottom:none;padding:6px 0"><span class="info-label">件数</span><span class="info-value" id="submitEntryCount">0件</span></div></div>
      <div class="submit-action"><button class="submit-btn" id="submitBtn" onclick="doSubmit()">提出する</button></div>
    </div>
  </div>
</div>

<!-- 変更タブ -->
<div class="section" id="sec-change">
  <div class="change-container">
    <div class="change-hint">カレンダーの日付をタップして、予定の変更・キャンセルができます。右下の「＋」ボタンから追加もできます。</div>
    <div class="day-detail" id="changeDayDetail">
      <div class="detail-header"><span id="changeDetailDate"></span></div>
      <div id="changeDetailList"></div>
    </div>
    <div class="request-history"><h4>最近の変更申請</h4><div id="requestList"></div></div>
  </div>
</div>

<button class="add-float-btn" id="fabAdd" onclick="openAddModal()">＋</button>
<div class="spacer"></div>

<!-- モーダル: 追加 -->
<div class="modal-overlay" id="addModal"><div class="modal">
  <h3>予定を追加する</h3>
  <div class="form-group"><label>サービス種類</label><select id="addType"><option value="居宅">居宅介護</option><option value="移動">移動支援</option><option value="家事">家事援助</option><option value="通院">通院介助</option></select></div>
  <div class="form-group"><label>日付</label><input type="date" id="addDate"></div>
  <div class="form-group"><label>開始時間</label><input type="time" id="addStart" value="09:00"></div>
  <div class="form-group"><label>終了時間</label><input type="time" id="addEnd" value="11:00"></div>
  <div class="form-group"><label>内容メモ（任意）</label><textarea id="addNote" placeholder="例：買い物に行きたい"></textarea></div>
  <div class="modal-buttons"><button class="modal-btn cancel" onclick="closeModal('addModal')">戻る</button><button class="modal-btn confirm" onclick="doAdd()">追加を申請</button></div>
</div></div>

<!-- モーダル: 提出用追加 -->
<div class="modal-overlay" id="submitAddModal"><div class="modal">
  <h3>希望日時を追加する</h3>
  <div class="form-group"><label>サービス種類</label><select id="submitAddType"><option value="居宅">居宅介護</option><option value="移動">移動支援</option><option value="家事">家事援助</option><option value="通院">通院介助</option></select></div>
  <div class="form-group"><label>日付</label><input type="date" id="submitAddDate"></div>
  <div class="form-group"><label>開始時間</label><input type="time" id="submitAddStart" value="09:00"></div>
  <div class="form-group"><label>終了時間</label><input type="time" id="submitAddEnd" value="11:00"></div>
  <div class="form-group"><label>内容メモ（任意）</label><textarea id="submitAddNote" placeholder="例：買い物に行きたい"></textarea></div>
  <div class="modal-buttons"><button class="modal-btn cancel" onclick="closeModal('submitAddModal')">戻る</button><button class="modal-btn confirm" onclick="doSubmitAdd()">追加する</button></div>
</div></div>

<!-- モーダル: 変更 -->
<div class="modal-overlay" id="editModal"><div class="modal">
  <h3>予定を変更する</h3>
  <div class="form-group"><label>サービス</label><input type="text" id="editService" readonly style="background:#f5f5f5"></div>
  <div class="form-group"><label>開始時間</label><input type="time" id="editStart"></div>
  <div class="form-group"><label>終了時間</label><input type="time" id="editEnd"></div>
  <div class="form-group"><label>変更理由</label><textarea id="editReason" placeholder="例：通院の時間が変わったため"></textarea></div>
  <div class="modal-buttons"><button class="modal-btn cancel" onclick="closeModal('editModal')">戻る</button><button class="modal-btn confirm" onclick="doEdit()">変更を申請</button></div>
</div></div>

<!-- モーダル: キャンセル -->
<div class="modal-overlay" id="cancelModal"><div class="modal">
  <h3>予定をキャンセルしますか？</h3>
  <div style="background:#fce4ec;border-radius:12px;padding:14px;margin-bottom:12px"><p style="font-size:14px;color:#c62828;font-weight:600" id="cancelDetail"></p></div>
  <div class="form-group"><label>キャンセル理由</label><textarea id="cancelReason" placeholder="例：体調不良のため"></textarea></div>
  <div class="modal-buttons"><button class="modal-btn cancel" onclick="closeModal('cancelModal')">戻る</button><button class="modal-btn danger" onclick="doCancel()">キャンセルを申請</button></div>
</div></div>

<!-- モーダル: 提出 -->
<div class="modal-overlay" id="submitModal"><div class="modal">
  <h3>スケジュールを提出しますか？</h3>
  <p style="font-size:14px;color:#666;text-align:center;margin-bottom:6px" id="submitConfirmText"></p>
  <p style="font-size:12px;color:#aaa;text-align:center">提出後の変更は「変更・追加」タブから申請できます</p>
  <div class="modal-buttons"><button class="modal-btn cancel" onclick="closeModal('submitModal')">戻る</button><button class="modal-btn confirm" onclick="doSubmit()">提出する</button></div>
</div></div>

<div class="toast" id="toast"></div>

<nav class="bottom-nav">
  <a class="nav-item" href="records.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg><span>実績記録</span></a>

  <a class="nav-item" href="mypage.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M5.5 21a8.38 8.38 0 0113 0"/></svg><span>マイページ</span></a>
</nav>

<script>
// ==========================================
// Supabase接続
// ==========================================
const SUPABASE_URL = 'https://pbqqqwwgswniuomjlhsh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBicXFxd3dnc3duaXVvbWpsaHNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MTA3NTcsImV4cCI6MjA4OTI4Njc1N30.XgImGhrTc-cVHO9tvapCCz0y3XJZn3ma4vnd_QBYfDk';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ==========================================
// GAS Web App連携（スプレッドシート同期）
// ==========================================
const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxlYmQHfINWY2szN_S1XBPhiYaj9-7ocLtE5l2w2pagr4ajdp9pytF5NsFQOY_vz6Px/exec';

async function syncToSheet(payload) {
  if (!GAS_WEB_APP_URL) { console.log('GAS URL未設定 - スプレッドシート同期スキップ'); return; }
  console.log('スプレッドシート同期開始:', JSON.stringify(payload));

  // 方法1: no-cors POSTで送信（GASリダイレクト問題を回避）
  // no-corsではレスポンスは読めないが、GAS側にはデータが届く
  try {
    await fetch(GAS_WEB_APP_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(payload)
    });
    console.log('スプレッドシート同期: no-cors送信完了');
  } catch (ex) {
    console.warn('スプレッドシート同期: no-cors送信失敗', ex);
  }

  // 方法2: 並行してGET + クエリパラメータでも送信（バックアップ）
  try {
    const params = encodeURIComponent(JSON.stringify(payload));
    const img = new Image();
    img.src = GAS_WEB_APP_URL + '?payload=' + params + '&t=' + Date.now();
    console.log('スプレッドシート同期: GETバックアップ送信');
  } catch (ex2) {
    console.warn('スプレッドシート同期: GETバックアップ失敗', ex2);
  }
}

const HELPER_APP_URL = 'https://village-tsubasa.web.app';

async function notifyHelper(helperEmail, helperName, type, detail) {
  if (!helperEmail || helperEmail === '' || helperName === '担当未設定') {
    console.log('通知スキップ: ヘルパー未設定');
    return;
  }

  const typeLabel = type === 'edit' ? '変更' : 'キャンセル';
  const title = `スケジュール${typeLabel}通知`;
  const body = `${displayName}さんの予定が${typeLabel}されました\n${detail}`;

  // 1) notifications テーブルに INSERT（通知一覧に表示される）
  try {
    const { error } = await sb.from('notifications').insert({
      target_email: helperEmail,
      title: title,
      body: body,
      link_url: '/schedule.html',
      notification_type: 'schedule_' + type,
      is_read: false
    });
    if (error) {
      console.warn('通知INSERT失敗:', error);
    } else {
      console.log('通知INSERT成功: ' + helperEmail);
    }
  } catch (ex) {
    console.warn('通知INSERTエラー:', ex);
  }

  // 2) プッシュ通知（ヘルパーアプリのAPIを呼び出し）
  try {
    const res = await fetch(HELPER_APP_URL + '/api/notify-push', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        target_email: helperEmail,
        title: title,
        body: body,
        type: 'schedule_' + type
      })
    });
    console.log('プッシュ通知API:', res.status);
  } catch (ex) {
    console.warn('プッシュ通知APIエラー（通知一覧には保存済み）:', ex);
  }
}

function taskInfo(task) {
  if (!task) return { name:'その他', icon:'📋', color:'#888', cls:'other' };
  const t = task.toString();
  if (t.includes('居宅') || t.includes('身体')) return { name:'居宅介護', icon:'🏠', color:'#4caf50', cls:'home' };
  if (t.includes('移動')) return { name:'移動支援', icon:'🚶', color:'#2196f3', cls:'mobility' };
  if (t.includes('家事')) return { name:'家事援助', icon:'🧹', color:'#ff9800', cls:'housework' };
  if (t.includes('通院')) return { name:'通院介助', icon:'🏥', color:'#9c27b0', cls:'hospital' };
  return { name: t, icon:'📋', color:'#888', cls:'other' };
}

function ds(y,m,d){return`${y}-${pad(m)}-${pad(d)}`}
function fmtD(s){const d=new Date(s+'T00:00:00');return`${d.getMonth()+1}月${d.getDate()}日（${WD[d.getDay()]}）`}
function fmtTime(t){if(!t)return'--:--';return t.substring(0,5)}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200)}

// ==========================================
// データ取得
// ==========================================
async function loadSchedule() {
  const startDate = ds(cYear, cMon, 1);
  const endDate = ds(cYear, cMon, new Date(cYear, cMon, 0).getDate());

  try {
    // schedule_web_v VIEWを使ってヘルパーメールも取得
    const { data, error } = await sb
      .from('schedule_web_v')
      .select('*')
      .eq('client', clientName)
      .gte('date', startDate)
      .lte('date', endDate)
      .order('date')
      .order('start_time');

    if (error) {
      // VIEWにアクセスできない場合はscheduleテーブルにフォールバック
      console.warn('schedule_web_vエラー、scheduleテーブルにフォールバック:', error);
      const fb = await sb.from('schedule').select('*')
        .eq('client', clientName).gte('date', startDate).lte('date', endDate)
        .order('date').order('start_time');
      if (fb.error) throw fb.error;
      if (fb.data) fb.data.forEach(row => {
        const d = row.date;
        if (!scheduleData[d]) scheduleData[d] = [];
        scheduleData[d].push({ id: row.id, task: row.task || row.summary || '',
          start: fmtTime(row.start_time), end: fmtTime(row.end_time),
          helper: row.name || '', helperEmail: '', summary: row.summary || '', haisha: row.haisha || '' });
      });
    } else {
      scheduleData = {};
      if (data) {
        data.forEach(row => {
          const d = row.date;
          if (!scheduleData[d]) scheduleData[d] = [];
          scheduleData[d].push({
            id: row.id,
            task: row.task || row.summary || '',
            start: fmtTime(row.start_time),
            end: fmtTime(row.end_time),
            helper: row.name || '',
            helperEmail: row.helper_email || '',
            summary: row.summary || '',
            haisha: row.haisha || ''
          });
        });
      }
    }
  } catch (ex) {
    console.error('データ取得エラー:', ex);
    toast('データの取得に失敗しました');
  }
}

// ==========================================

function renderCalendar() {
  const g = document.getElementById('calGrid');
  g.innerHTML = '';
  const f = new Date(cYear, cMon-1, 1);
  const sd = f.getDay();
  const dim = new Date(cYear, cMon, 0).getDate();
  const pd = new Date(cYear, cMon-1, 0).getDate();
  const td = new Date().toISOString().slice(0,10);
  const tc = Math.ceil((sd+dim)/7)*7;

  for (let i = 0; i < tc; i++) {
    let day, d2, ot = false;
    if (i < sd) { day=pd-sd+i+1; const pm=cMon-1<1?12:cMon-1,py=cMon-1<1?cYear-1:cYear; d2=ds(py,pm,day); ot=true; }
    else if (i-sd >= dim) { day=i-sd-dim+1; const nm=cMon+1>12?1:cMon+1,ny=cMon+1>12?cYear+1:cYear; d2=ds(ny,nm,day); ot=true; }
    else { day=i-sd+1; d2=ds(cYear,cMon,day); }

    const c = document.createElement('div');
    c.className = 'cal-day';
    if (ot) c.classList.add('other-month');
    if (d2===td) c.classList.add('today');
    if (d2===selDate) c.classList.add('selected');
    c.dataset.date = d2;
    c.onclick = () => selectDate(d2);

    const n = document.createElement('div');
    n.className = 'day-num';
    n.textContent = day;
    c.appendChild(n);

    const dots = document.createElement('div');
    dots.className = 'day-dots';
    if (scheduleData[d2]) {
      const types = [...new Set(scheduleData[d2].map(s => taskInfo(s.task).cls))];
      types.forEach(cls => {
        const d = document.createElement('div');
        d.className = 'day-dot';
        const colors = {home:'#4caf50',mobility:'#2196f3',housework:'#ff9800',hospital:'#9c27b0',other:'#888'};
        d.style.background = colors[cls] || '#888';
        dots.appendChild(d);
      });
    }
    c.appendChild(dots);
    g.appendChild(c);
  }
}

function selectDate(d) {

function getSubmitTargetMonth() {
  // 提出対象は常に「今日の翌月」（カレンダー表示月ではなく実際の現在月ベース）
  const now = new Date();
  const realMonth = now.getMonth() + 1; // 1-12
  const realYear = now.getFullYear();
  const nm = realMonth + 1 > 12 ? 1 : realMonth + 1;
  const ny = realMonth + 1 > 12 ? realYear + 1 : realYear;
  return { nm, ny };
}

function renderSubmitPreview() {
  const { nm, ny } = getSubmitTargetMonth();
  document.getElementById('submitTarget').textContent = `${ny}年${nm}月分`;
  const sorted = [...submitEntries].sort((a,b)=>new Date(a.date)-new Date(b.date));
  let h = '';
  if (!sorted.length) {
    h = '<p style="color:#ccc;text-align:center;padding:12px">＋ボタンから希望日時を追加してください</p>';
  } else {
    h = sorted.map((e,idx)=>{
      const ti = taskInfo(e.type);
      return `<div class="submit-entry"><div class="submit-entry-info"><div class="submit-entry-type">${ti.name}</div><div class="submit-entry-time">${fmtD(e.date).replace(/（.+）/,'')} ${e.start}〜${e.end}</div></div><button class="submit-entry-del" onclick="removeSubmitEntry(${idx})">✕</button></div>`;
    }).join('');
  }
  document.getElementById('submitPreview').innerHTML = h;
  document.getElementById('submitEntryCount').textContent = sorted.length + '件';
}

function openSubmitAddModal() {
  const { nm, ny } = getSubmitTargetMonth();
  const nextMonthFirst = ds(ny, nm, 1);
  document.getElementById('submitAddType').value = '居宅';
  document.getElementById('submitAddDate').value = nextMonthFirst;
  document.getElementById('submitAddStart').value = '09:00';
  document.getElementById('submitAddEnd').value = '11:00';
  document.getElementById('submitAddNote').value = '';
  document.getElementById('submitAddModal').classList.add('show');
}

function doSubmitAdd() {
  const type = document.getElementById('submitAddType').value;
  const date = document.getElementById('submitAddDate').value;
  const start = document.getElementById('submitAddStart').value;
  const end = document.getElementById('submitAddEnd').value;
  const note = document.getElementById('submitAddNote').value;
  if (!date||!start||!end) { toast('日付と時間を入力してください'); return; }
  submitEntries.push({ type, date, start, end, note });

}

function removeSubmitEntry(idx) {
  submitEntries.splice(idx, 1);
  renderSubmitPreview();
}

async function doSubmit() {
  if (isProcessing) { console.log('処理中のため無視'); return; }
  if (!submitEntries.length) { toast('希望を追加してください'); return; }

  isProcessing = true;
  const btn = document.getElementById('submitBtn');
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '送信中…';

  try {
    const bNum = sessionStorage.getItem('beneficiaryNumber') || null;
    const rows = submitEntries.map(e => ({
      date: e.date,
      client: clientName,
      task: e.type,
      summary: e.note || e.type,
      start_time: e.start,
      end_time: e.end,
      name: '担当未設定',
      beneficiary_number: bNum
    }));
    console.log('提出データ:', rows);
    const { error } = await sb.from('schedule').insert(rows);
    console.log('提出結果:', { error });
    if (error) throw error;

    // スプレッドシート同期（各エントリを個別に送信）
    submitEntries.forEach(e => {
      syncToSheet({
        action: 'add', supabaseId: null, date: e.date,
        helper: '担当未設定', client: clientName,
        startTime: e.start, endTime: e.end,
        task: e.type, summary: e.note || e.type,
        beneficiaryNumber: bNum || ''
      });
    });

    submitEntries = [];
    renderSubmitPreview();
    const tgt = getSubmitTargetMonth();
    await loadSchedule();
    renderCalendar();
    toast(`${tgt.ny}年${tgt.nm}月のスケジュールを提出しました`);
  } catch (ex) {
    console.error('提出エラー:', ex);
    toast('提出に失敗しました: ' + (ex.message || ex));
  } finally {
    isProcessing = false;
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

  tab.classList.add('active');
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+page).classList.add('active');
  document.getElementById('fabAdd').classList.toggle('show', page==='change');
  if (page==='submit') renderSubmitPreview();
  if (page==='change') { renderChangeDayDetail(); renderRequests(); }
}

// 初期化
init();
</script>
</body>
